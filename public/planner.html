<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Planner — Muze Ops Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #e0e0e0; }

  .breadcrumb { background: #1a1a2e; color: rgba(255,255,255,0.7); padding: 6px 24px; font-size: 12px; display: flex; align-items: center; gap: 6px; }
  .breadcrumb a { color: rgba(255,255,255,0.7); text-decoration: none; }
  .breadcrumb a:hover { color: white; }
  .breadcrumb .sep { opacity: 0.4; }
  .breadcrumb .right { margin-left: auto; display: flex; gap: 16px; }

  .page-wrap { display: flex; justify-content: center; padding: 16px; overflow-x: auto; }
  .page { font-family: 'Mitr', sans-serif; width: 210mm; min-height: 297mm; background: white; padding: 0.5cm; position: relative; overflow: hidden; }
  @media screen { .page { zoom: 1.25; } }

  .header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 6px; margin-bottom: 6px; padding-top: 2px; }
  .header-left { display: flex; align-items: center; gap: 8px; }
  .title-block h1 { font-size: 22px; font-weight: 700; letter-spacing: 1px; color: #111; }
  .title-block p { font-size: 9.5px; color: #555; margin-top: 1px; font-style: italic; }
  .date-area { text-align: right; }
  .date-label { font-size: 6.5px; letter-spacing: 1px; color: #999; text-transform: uppercase; }
  .date-value { font-size: 12px; font-weight: 700; color: #111; letter-spacing: 0.3px; display: block; }
  .save-planner-btn {
    margin-top: 5px; font-size: 9px; padding: 3px 8px;
    background: #444; color: white; border: none; border-radius: 3px;
    cursor: pointer; font-family: 'Mitr', sans-serif; font-weight: 400;
    display: block; width: 100%;
  }
  .save-planner-btn:hover { background: #222; }
  .save-status { font-size: 8px; color: #4a7c6f; margin-top: 3px; text-align: right; height: 10px; }

  table { width: 100%; border-collapse: collapse; font-size: 10px; }
  thead tr th { background: #4a7c6f; color: white; padding: 3px 5px; text-align: left; font-size: 8px; letter-spacing: 1.2px; text-transform: uppercase; font-weight: 600; }
  thead tr th:first-child { width: 44px; text-align: center; }
  thead tr th:nth-child(2) { width: 265px; }

  tbody tr { border-bottom: 0.5px solid #d5e8e4; }
  tbody tr:nth-child(even) { background: #f2f2f2; }
  tbody tr.hour-mark { border-top: 1.5px solid #4a7c6f; }
  tbody tr td { padding: 1px 5px; vertical-align: middle; color: #111; line-height: 1.2; }
  tbody tr td:first-child { text-align: center; font-weight: 700; font-size: 10.5px; color: #2d5a50; border-right: 2px solid #4a7c6f; white-space: nowrap; letter-spacing: -0.3px; background: #e8e8e8; }
  tbody tr td:nth-child(2) { border-right: 1px dashed #a8cfc8; }
  .task-cell { height: 20px; }
  td[contenteditable="true"]:empty::before { content: attr(data-ph); color: #ccc; font-size: 8px; }
  td[contenteditable="true"]:focus { outline: none; background: #fffef0 !important; }
  td[contenteditable="true"] { cursor: text; }

  .cal-event { background: #d4eaf8; border-radius: 2px; padding: 0 4px; font-size: 9.5px; color: #1a4a6b; display: inline-block; font-weight: 600; border-left: 2px solid #4a90b8; }
  .cal-cont { font-size: 8.5px; color: #4a7c6f; padding-left: 8px; }
  .cal-note { font-size: 8.5px; color: #555; }
  tr.has-event td { background: #eaf4fb !important; }
  tr.lunch td { background: inherit; }
  .lunch-label { font-size: 10px; font-weight: 700; color: #8a6200; letter-spacing: 0.3px; }

  /* TODO LIST */
  .todo-cell {
    vertical-align: top; padding: 5px 6px !important;
    background: #fafafa !important; border-left: 1px solid #ddd;
    overflow-y: auto; max-height: 240px;
  }
  .todo-header {
    font-size: 9px; font-weight: 600; color: #555;
    letter-spacing: 0.8px; text-transform: uppercase;
    border-bottom: 0.5px solid #ccc; padding-bottom: 2px; margin-bottom: 3px;
    display: flex; justify-content: space-between; align-items: center;
  }
  #todo-list { column-count: 1; }
  .todo-item { display: flex; align-items: flex-start; gap: 3px; font-size: 9.5px; font-weight: 400; line-height: 1.4; margin: 2px 0; break-inside: avoid; }
  .todo-item.overdue-item { border-left: 2px solid #dc2626; padding-left: 2px; background: #fff5f5; border-radius: 2px; }
  .todo-cb { cursor: pointer; font-size: 11px; flex-shrink: 0; color: #555; user-select: none; line-height: 1.3; margin-top: 0; }
  .todo-text { flex: 1; min-width: 0; word-break: break-word; color: #111; line-height: 1.4; font-weight: 400; cursor: text; border-radius: 2px; padding: 0 2px; }
  .todo-text:focus { outline: none; background: #fffef0; box-shadow: 0 0 0 1px #a8cfc8; }
  .todo-item.done .todo-text { text-decoration: line-through; color: #b0b0b0; }
  .p-badge { font-size: 6.5px; padding: 0 3px; border-radius: 2px; font-weight: 500; white-space: nowrap; line-height: 1.6; }
  .p-high { background: #fee2e2; color: #b91c1c; border: 0.5px solid #fca5a5; }
  .p-med  { background: #fef3c7; color: #92400e; border: 0.5px solid #fde68a; }
  .p-low  { background: #f3f4f6; color: #6b7280; border: 0.5px solid #d1d5db; }
  .due-date { font-size: 7.5px; color: #888; white-space: nowrap; font-weight: 400; }
  .due-overdue { color: #dc2626 !important; font-weight: 500; }
  .todo-del { cursor: pointer; color: #ccc; font-size: 10px; flex-shrink: 0; line-height: 1.5; margin-top: 1px; }
  .todo-del:hover { color: #e57373; }

  #add-task-area {
    display: flex; gap: 3px; align-items: center;
    margin-top: 5px; border-top: 0.5px solid #d5e8e4; padding-top: 4px;
  }
  #new-task-input {
    flex: 2; min-width: 0; font-size: 11px; padding: 2px 4px;
    border: 0.5px solid #a8cfc8; border-radius: 2px;
    font-family: 'Mitr', sans-serif; color: #111; background: white; outline: none;
  }
  #new-task-input:focus { border-color: #4a7c6f; }
  #new-task-priority {
    font-size: 9px; padding: 1px 2px; border: 0.5px solid #a8cfc8;
    border-radius: 2px; background: white; color: #111; font-family: 'Mitr', sans-serif;
    flex-shrink: 0;
  }
  #new-task-due {
    flex: 1; min-width: 0; font-size: 9px; padding: 1px 3px;
    border: 0.5px solid #a8cfc8; border-radius: 2px; background: white; color: #111;
  }
  #add-task-btn {
    font-size: 15px; font-weight: 700; padding: 1px 7px; flex-shrink: 0;
    background: #4a7c6f; color: white; border: none; border-radius: 2px; cursor: pointer; line-height: 1.4;
  }
  #add-task-btn:hover { background: #3a6a5f; }

  @media print {
    .breadcrumb { display: none; }
    @page { size: A4 portrait; margin: 0.5cm; }
    body { background: white; }
    .page-wrap { padding: 0; overflow-x: visible; }
    .page { width: 100%; min-height: 0; padding: 0; box-shadow: none; zoom: 1; }
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    #add-task-area { display: none !important; }
    .save-planner-btn, .save-status { display: none !important; }
    .todo-del { display: none !important; }
    td[contenteditable]:empty::before { content: none !important; }
  }
</style>
</head>
<body>

<div class="breadcrumb">
  <a href="/">🏠 Muze Ops Portal</a>
  <span class="sep">/</span>
  <span>Daily Planner</span>
  <div class="right">
    <a href="/">← กลับหน้าหลัก</a>
    <a href="/logout">Logout</a>
  </div>
</div>

<div class="page-wrap">
<div class="page">

  <div class="header">
    <div class="header-left">
      <div class="title-block">
        <h1>Daily Planner</h1>
        <p id="date-subtitle"></p>
      </div>
    </div>
    <div class="date-area">
      <span class="date-label">Date &amp; Day</span>
      <span class="date-value" id="date-value">—</span>
      <button class="save-planner-btn" onclick="manualSave()">💾 Save Planner</button>
      <div class="save-status" id="save-status"></div>
    </div>
  </div>

  <table>
    <thead>
      <tr><th>Time</th><th>Task / Activity</th><th>Brief Detail / Note</th></tr>
    </thead>
    <tbody id="planner-tbody"></tbody>
  </table>

</div>
</div>

<script>
const DATE = new URLSearchParams(location.search).get('date') || todayStr();

let scheduleSlots = null;
let cells = {};
let todos = [];
let lastMondayCleanup = null;

function todayStr() { return new Date().toISOString().split('T')[0]; }

function fmtDateDisplay(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function esc(t) { return (t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function buildDefaultSlots() {
  const slots = [];
  let h = 6, m = 0;
  while (h < 18 || (h === 18 && m === 0)) {
    const time = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    const lunch = h === 12;
    slots.push({
      time, hourMark: m === 0, hasEvent: false, lunch,
      eventLabel: lunch && m === 0 ? 'Lunch Break' : null,
      eventType: lunch ? 'lunch' : null,
      note: lunch && m === 0 ? '12:00–13:00' : null,
      noteFixed: lunch,
    });
    m += 15;
    if (m === 60) { m = 0; h++; }
  }
  return slots;
}

async function init() {
  document.getElementById('date-value').textContent = fmtDateDisplay(DATE);
  document.getElementById('date-subtitle').textContent = DATE === todayStr() ? 'Today' : DATE;

  const [scheduleRes, cellsRes, todosRes] = await Promise.all([
    fetch(`/api/planner/schedule?date=${DATE}`).then(r => r.json()),
    fetch(`/api/planner/cells?date=${DATE}`).then(r => r.json()),
    fetch(`/api/planner/todos`).then(r => r.json()),
  ]);

  scheduleSlots = scheduleRes.slots;
  cells = cellsRes.cells || {};
  todos = todosRes.todos || [];
  lastMondayCleanup = todosRes.lastMondayCleanup || null;

  applyMondayCleanup();
  renderTable();
  renderTodos();
}

function applyMondayCleanup() {
  const today = new Date();
  if (today.getDay() === 1 && lastMondayCleanup !== todayStr()) {
    const before = todos.length;
    todos = todos.filter(t => !t.done);
    lastMondayCleanup = todayStr();
    if (todos.length !== before) saveTodos();
  }
}

function renderTable() {
  const slots = (scheduleSlots && scheduleSlots.length) ? scheduleSlots : buildDefaultSlots();
  const tbody = document.getElementById('planner-tbody');
  tbody.innerHTML = '';

  slots.forEach((slot, idx) => {
    const tr = document.createElement('tr');
    tr.className = [slot.hourMark ? 'hour-mark' : '', slot.hasEvent ? 'has-event' : '', slot.lunch ? 'lunch' : ''].filter(Boolean).join(' ');

    const tdTime = document.createElement('td');
    tdTime.textContent = slot.time;
    tr.appendChild(tdTime);

    const tdTask = document.createElement('td');
    tdTask.className = 'task-cell';
    if (slot.lunch && slot.hourMark) {
      tdTask.innerHTML = `<span class="lunch-label">🍱 ${esc(slot.eventLabel || 'Lunch Break')}</span>`;
    } else if (slot.lunch) {
      tdTask.innerHTML = `<span class="lunch-label">🍱 Lunch Break</span>`;
    } else if (slot.hasEvent) {
      tdTask.innerHTML = slot.eventType === 'start'
        ? `<span class="cal-event">${esc(slot.eventLabel)}</span>`
        : `<span class="cal-cont">↳ ${esc(slot.eventLabel)}</span>`;
    } else {
      tdTask.contentEditable = 'true';
      tdTask.dataset.ph = 'task...';
      tdTask.dataset.time = slot.time;
      tdTask.dataset.field = 'task';
      tdTask.innerHTML = (cells[slot.time] && cells[slot.time].task) || '';
      tdTask.addEventListener('blur', onCellBlur);
    }
    tr.appendChild(tdTask);

    if (idx === 0) {
      const tdTodo = document.createElement('td');
      tdTodo.className = 'todo-cell';
      tdTodo.rowSpan = 12;
      tdTodo.innerHTML = `
        <div class="todo-header"><span>📋 To-Do List</span></div>
        <div id="todo-list"></div>
        <div id="add-task-area">
          <input type="text" id="new-task-input" placeholder="task..." onkeydown="if(event.key==='Enter')addTask()">
          <select id="new-task-priority">
            <option value="high">🔴 H</option>
            <option value="medium" selected>🟡 M</option>
            <option value="low">⚪ L</option>
          </select>
          <input type="date" id="new-task-due">
          <button id="add-task-btn" onclick="addTask()">+</button>
        </div>`;
      tr.appendChild(tdTodo);
    } else if (idx >= 12) {
      const tdNote = document.createElement('td');
      if (slot.noteFixed) {
        tdNote.className = 'cal-note';
        tdNote.textContent = slot.note || '';
      } else {
        tdNote.contentEditable = 'true';
        tdNote.dataset.ph = 'note...';
        tdNote.dataset.time = slot.time;
        tdNote.dataset.field = 'note';
        tdNote.innerHTML = (cells[slot.time] && cells[slot.time].note) || '';
        tdNote.addEventListener('blur', onCellBlur);
      }
      tr.appendChild(tdNote);
    }

    tbody.appendChild(tr);
  });
}

let saveCellsTimeout;
function onCellBlur(e) {
  const time = e.target.dataset.time;
  const field = e.target.dataset.field;
  const value = e.target.innerHTML.trim();
  if (!cells[time]) cells[time] = {};
  cells[time][field] = value;
  if (!cells[time].task && !cells[time].note) delete cells[time];
  scheduleSaveCells();
}

function scheduleSaveCells() {
  clearTimeout(saveCellsTimeout);
  saveCellsTimeout = setTimeout(saveCells, 600);
}

async function saveCells() {
  await fetch('/api/planner/cells', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ date: DATE, cells }),
  });
  flashSaved();
}

function isOverdue(task) {
  if (!task.dueDate || task.done) return false;
  const due = new Date(task.dueDate + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  return due < today;
}

function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${dt.getDate()} ${months[dt.getMonth()]}`;
}

function pBadge(p) {
  if (p === 'high') return '<span class="p-badge p-high">HIGH</span>';
  if (p === 'low')  return '<span class="p-badge p-low">LOW</span>';
  return '<span class="p-badge p-med">MED</span>';
}

function renderTodos() {
  const list = document.getElementById('todo-list');
  if (!list) return;
  if (!todos.length) {
    list.innerHTML = '<div style="font-size:8px;color:#bbb;padding:2px 0;">ยังไม่มี task — เพิ่มด้านล่าง</div>';
    return;
  }
  list.innerHTML = todos.map((t, i) => {
    const over = isOverdue(t);
    const duePart = t.dueDate
      ? `<span class="due-date${over ? ' due-overdue' : ''}">${fmtDate(t.dueDate)}</span>`
      : '';
    return `<div class="todo-item${t.done ? ' done' : ''}${over ? ' overdue-item' : ''}">
      <span class="todo-cb" onclick="toggleTodo(${i})">${t.done ? '☑' : '☐'}</span>
      ${duePart}${pBadge(t.priority || 'medium')}
      <span class="todo-text" contenteditable="true" onblur="editTodo(${i},this)" onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}">${esc(t.text)}</span>
      <span class="todo-del" onclick="delTodo(${i})">✕</span>
    </div>`;
  }).join('');
}

function toggleTodo(i) { todos[i].done = !todos[i].done; saveTodos(); renderTodos(); }
function delTodo(i) { todos.splice(i, 1); saveTodos(); renderTodos(); }
function editTodo(i, el) {
  const newText = el.innerText.trim();
  if (newText && newText !== todos[i].text) { todos[i].text = newText; saveTodos(); }
  else if (!newText) renderTodos();
}

function addTask() {
  const input = document.getElementById('new-task-input');
  const text = input.value.trim(); if (!text) return;
  const priority = document.getElementById('new-task-priority').value;
  const dueDate = document.getElementById('new-task-due').value;
  todos.push({ id: Date.now(), text, done: false, priority, dueDate });
  saveTodos(); renderTodos();
  input.value = '';
  document.getElementById('new-task-due').value = '';
  input.focus();
}

async function saveTodos() {
  await fetch('/api/planner/todos', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ todos, lastMondayCleanup }),
  });
  flashSaved();
}

let flashTimeout;
function flashSaved() {
  const el = document.getElementById('save-status');
  el.textContent = 'บันทึกแล้ว ✓';
  clearTimeout(flashTimeout);
  flashTimeout = setTimeout(() => { el.textContent = ''; }, 1500);
}

async function manualSave() {
  clearTimeout(saveCellsTimeout);
  await Promise.all([saveCells(), saveTodos()]);
}

init();
</script>
</body>
</html>
